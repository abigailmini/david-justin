<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ——— Amber cursor glow ———
function AmberCursor() {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current; if(!el) return;
    let x=-200,y=-200,tx=-200,ty=-200;
    const onMove = e=>{ tx=e.clientX; ty=e.clientY; };
    window.addEventListener('pointermove',onMove);
    let raf;
    const tick = ()=>{
      x+=(tx-x)*0.18; y+=(ty-y)*0.18;
      el.style.transform=`translate(${x}px,${y}px)`;
      raf=requestAnimationFrame(tick);
    };
    tick();
    return ()=>{ window.removeEventListener('pointermove',onMove); cancelAnimationFrame(raf); };
  },[]);
  return <div ref={ref} aria-hidden style={{
    position:'fixed',top:0,left:0,width:480,height:480,marginLeft:-240,marginTop:-240,
    pointerEvents:'none',zIndex:1,
    background:'radial-gradient(circle,var(--accent-soft) 0%,transparent 60%)',
    opacity:0.55,mixBlendMode:'screen',
  }}/>;
}

// ——— Scroll reveal ———
function Reveal({children,delay=0,y=24,as='div',...rest}) {
  const ref=useRef();
  const [v,setV]=useState(false);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const io=new IntersectionObserver(([e])=>{ if(e.isIntersecting){setV(true);io.disconnect();} },{threshold:0.12});
    io.observe(el);
    return ()=>io.disconnect();
  },[]);
  const Tag=as;
  return <Tag ref={ref} {...rest} style={{
    ...(rest.style||{}),
    opacity:v?1:0,
    transform:v?'translateY(0)':`translateY(${y}px)`,
    transition:`opacity 900ms cubic-bezier(.22,.61,.36,1) ${delay}ms,transform 900ms cubic-bezier(.22,.61,.36,1) ${delay}ms`,
  }}>{children}</Tag>;
}

// ——— Animated counter ———
function Counter({to,suffix='',duration=1800,decimals=0}) {
  const ref=useRef(); const [n,setN]=useState(0);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const io=new IntersectionObserver(([e])=>{
      if(!e.isIntersecting) return; io.disconnect();
      const start=performance.now();
      const step=t=>{
        const p=Math.min(1,(t-start)/duration);
        const eased=1-Math.pow(1-p,3);
        setN(eased*to);
        if(p<1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    },{threshold:0.3});
    io.observe(el);
    return ()=>io.disconnect();
  },[to,duration]);
  return <span ref={ref}>{n.toLocaleString(undefined,{minimumFractionDigits:decimals,maximumFractionDigits:decimals})}{suffix}</span>;
}

// ——— Section label ———
function SectionLabel({num,children}) {
  return <div style={{display:'flex',alignItems:'center',gap:14,fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.22em',textTransform:'uppercase',color:'var(--accent)',opacity:0.85}}>
    <span style={{fontVariantNumeric:'tabular-nums'}}>§ {num}</span>
    <span style={{width:36,height:1,background:'currentColor',opacity:0.5}}/>
    <span style={{color:'var(--ink-60)'}}>{children}</span>
  </div>;
}

// ——— Marquee ———
function Marquee({children,reverse=false,speed=60,style={}}) {
  return <div style={{overflow:'hidden',position:'relative',...style}}>
    <div style={{display:'flex',gap:0,width:'max-content',animation:`${reverse?'mq-rev':'mq-fwd'} ${speed}s linear infinite`}}>
      {children}{children}
    </div>
  </div>;
}

// ——— Smart image ———
function SmartImg({src,alt,style,className,label}) {
  const [err,setErr]=useState(false);
  if(err) return <div className={className} style={{...style,display:'flex',alignItems:'center',justifyContent:'center',background:'repeating-linear-gradient(45deg,var(--surface-1),var(--surface-1) 8px,var(--surface-2) 8px,var(--surface-2) 16px)',color:'var(--ink-40)',fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.1em'}}>{label||alt||'IMAGE'}</div>;
  return <img src={src} alt={alt||''} className={className} style={style} onError={()=>setErr(true)} loading="lazy"/>;
}

// ——— Corner marks ———
function CornerMarks() {
  const c={position:'absolute',width:18,height:18,borderColor:'var(--accent)',opacity:0.4};
  return <>
    <div style={{...c,top:24,left:24,borderTop:'1px solid',borderLeft:'1px solid'}}/>
    <div style={{...c,top:24,right:24,borderTop:'1px solid',borderRight:'1px solid'}}/>
    <div style={{...c,bottom:24,left:24,borderBottom:'1px solid',borderLeft:'1px solid'}}/>
    <div style={{...c,bottom:24,right:24,borderBottom:'1px solid',borderRight:'1px solid'}}/>
  </>;
}

// ——— NAV ———
function Nav() {
  const [scrolled,setScrolled]=useState(false);
  useEffect(()=>{
    const on=()=>setScrolled(window.scrollY>40);
    on(); window.addEventListener('scroll',on,{passive:true});
    return ()=>window.removeEventListener('scroll',on);
  },[]);
  return <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:50,padding:scrolled?'14px 40px':'28px 40px',transition:'padding .4s,background .4s,border-color .4s',background:scrolled?'rgba(10,9,6,0.78)':'transparent',backdropFilter:scrolled?'blur(18px) saturate(1.4)':'none',borderBottom:scrolled?'1px solid var(--line)':'1px solid transparent',display:'flex',alignItems:'center',justifyContent:'space-between',fontFamily:'var(--sans)'}}>
    <div id="nav-logo" style={{display:'flex',alignItems:'baseline',gap:10}}>
      <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--ink)',letterSpacing:'-0.01em'}}>David</div>
      <div style={{width:6,height:6,background:'var(--accent)',borderRadius:'50%',transform:'translateY(-2px)',boxShadow:'0 0 12px var(--accent)'}}/>
      <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--ink)',letterSpacing:'-0.01em'}}>Justin</div>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:36,fontSize:13,letterSpacing:'0.04em'}}>
      <a href="#record" style={{color:'var(--ink-80)',textDecoration:'none',fontFamily:'var(--sans)',fontSize:13,letterSpacing:'0.02em'}}>Record</a>
      <a href="#press" style={{color:'var(--ink-80)',textDecoration:'none',fontFamily:'var(--sans)',fontSize:13,letterSpacing:'0.02em'}}>Press</a>
      <a href="#testimonials" style={{color:'var(--ink-80)',textDecoration:'none',fontFamily:'var(--sans)',fontSize:13,letterSpacing:'0.02em'}}>Voices</a>
      <a href="#faq" style={{color:'var(--ink-80)',textDecoration:'none',fontFamily:'var(--sans)',fontSize:13,letterSpacing:'0.02em'}}>Enquiry</a>
      <a href="#contact" style={{padding:'10px 18px',border:'1px solid var(--accent)',color:'var(--accent)',textDecoration:'none',fontSize:12,letterSpacing:'0.12em',textTransform:'uppercase',fontFamily:'var(--mono)',background:'rgba(229,180,106,0.06)',transition:'all .3s'}}
        onMouseEnter={e=>{e.target.style.background='var(--accent)';e.target.style.color='var(--bg)';}}
        onMouseLeave={e=>{e.target.style.background='rgba(229,180,106,0.06)';e.target.style.color='var(--accent)';}}>Enquire →</a>
    </div>
  </nav>;
}

// ——— HERO ———
function Hero() {
  const [mx,setMx]=useState({x:0,y:0});
  const heroRef=useRef();
  useEffect(()=>{
    const el=heroRef.current; if(!el) return;
    const on=e=>{ const r=el.getBoundingClientRect(); setMx({x:((e.clientX-r.left)/r.width-0.5)*2,y:((e.clientY-r.top)/r.height-0.5)*2}); };
    el.addEventListener('pointermove',on);
    return ()=>el.removeEventListener('pointermove',on);
  },[]);
  return <section ref={heroRef} style={{position:'relative',minHeight:'100vh',overflow:'hidden',paddingTop:140,paddingBottom:80,background:'var(--bg)'}}>
    <div aria-hidden style={{position:'absolute',inset:0,zIndex:0,backgroundImage:"url('https://www.david-justin.com/wp-content/uploads/2026/01/david-bg-scaled.png')",backgroundSize:'cover',backgroundPosition:'center',transform:`translate(${mx.x*-20}px,${mx.y*-12}px) scale(1.08)`,transition:'transform .3s ease-out',opacity:0.55,filter:'saturate(0.85) contrast(1.05)'}}/>
    <div aria-hidden style={{position:'absolute',inset:0,zIndex:1,pointerEvents:'none',background:'radial-gradient(ellipse 90% 60% at 50% 100%,rgba(229,180,106,0.18),transparent 60%),radial-gradient(ellipse 50% 40% at 18% 22%,rgba(229,180,106,0.12),transparent 55%),linear-gradient(180deg,rgba(10,9,6,0.55) 0%,rgba(10,9,6,0.3) 40%,rgba(10,9,6,0.85) 100%)'}}/>
    <CornerMarks/>
    <div id="hero-grid" style={{maxWidth:1440,margin:'0 auto',padding:'0 40px',display:'grid',gridTemplateColumns:'1.1fr 1fr',gap:60,alignItems:'center'}}>
      <div style={{position:'relative',zIndex:2}}>
        <Reveal>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:36}}>
            <span style={{fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.24em',color:'var(--accent)'}}>GUINNESS WORLD RECORD HOLDER</span>
            <span style={{width:40,height:1,background:'var(--accent)',opacity:0.6}}/>
            <span style={{fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.18em',color:'var(--ink-60)'}}>EST. 2022 · KL</span>
          </div>
