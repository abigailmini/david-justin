<style>

    --surface-2: #1A1713;
    --ink: #F2ECE0;

    --bg-tint: rgba(10,9,6,0.35);

  [data-mode="light"] {

    --ink-80: #3C3326;

    --overlay: rgba(246,241,231,0.88);

    --bg-tint: rgba(237,230,214,0.6);

  [data-accent="rose"]    { --accent: oklch(0.78 0.14 15);  --accent-soft: oklch(0.78 0.14 15 / 0.22); }
  [data-accent="ice"]     { --accent: oklch(0.82 0.1 220);  --accent-soft: oklch(0.82 0.1 220 / 0.22); }

  @media (pointer:coarse) { html,body,button,a,input { cursor:auto; } }

  /* ===== RESPONSIVE MOBILE ===== */
  @media (max-width:768px) {
    nav > div:last-child { display:none !important; }
    nav { padding:16px 20px !important; }
    section { padding-left:0 !important; padding-right:0 !important; }
    section > div { padding:0 20px !important; max-width:100% !important; }
    /* Hero */
    #hero-grid { grid-template-columns:1fr !important; }
    #hero-right { display:none !important; }
    #hero-h1 { font-size:clamp(52px,12vw,80px) !important; }
    /* Fix 3: push hero text below face — section is min-height:100vh so there's room */
    @media (max-width:768px) { #hero-grid > div:first-child { padding-top:20vh !important; } }
    #hero-stats { grid-template-columns:1fr 1fr 1fr !important; }
    #hero-stats > div > div:first-child { font-size:clamp(20px,6vw,32px) !important; }
    #hero-stats > div { padding:16px 8px 0 0 !important; padding-left:12px !important; }
    /* Two-col grids → single */
    .grid-2col, .grid-3col, .grid-4col {
      grid-template-columns: 1fr !important;
    }
    /* Record */
    #record-grid { grid-template-columns:1fr !important; }
    /* Hero bg — no zoom/parallax on mobile */
    #hero-bg { transform:none !important; opacity:0.45 !important; }
    /* Press */
    #press-grid { grid-template-columns:1fr !important; }
    #press-layout { grid-template-columns:1fr !important; }
    #press-layout > *:first-child { display:block !important; }
    #press-list-item { grid-template-columns:36px 64px 1fr auto !important; gap:10px !important; }
    /* Vlog */
    #vlog-grid { grid-template-columns:1fr !important; }
    /* FAQ */
    #faq-grid { grid-template-columns:1fr !important; position:static !important; }
    #faq-sticky { position:static !important; top:auto !important; }
    /* Testimonials grid */
    #testimonials-grid { grid-template-columns:1fr !important; }
    /* Exchanges — horizontal scroll on mobile */
    #exchanges-grid {
      display:flex !important;
      flex-direction:row !important;
      overflow-x:auto !important;
      scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      border-left:none !important;
      padding-bottom:8px;
      gap:0;
    }
    #exchanges-grid::-webkit-scrollbar { display:none; }
    #exchanges-grid > div {
      flex:0 0 160px !important;
      width:160px !important;
      scroll-snap-align:start;
      min-height:220px;

    /* LumaEvents */
    #luma-grid { grid-template-columns:1fr !important; }
    /* Footer */
    #footer-grid { grid-template-columns:1fr !important; gap:32px !important; }
    /* Nav hamburger — mobile only shows logo */
    #nav-logo { font-size:18px !important; }
    h2 { font-size:clamp(36px,8vw,60px) !important; }
    /* Press stage mobile */
    #press-stage { height:auto !important; display:flex !important; flex-direction:column !important; overflow:visible !important; }
    #press-stage > * > a.press-feature,
    #press-stage > div > a.press-feature { height:auto !important; aspect-ratio:3/4 !important; }
    /* Fix 1: nuclear press-thumbs scroll fix */
    #press-thumbs { display:flex !important; flex-direction:row !important; overflow-x:scroll !important;
      overflow-y:visible !important; -webkit-overflow-scrolling:touch !important; scrollbar-width:none;

    #press-stage > div { min-width:0; width:100% !important; }
    #press-stage > div:last-child { overflow:visible !important; width:100% !important; }
    #press-thumbs::-webkit-scrollbar { display:none; }
    #press-thumbs > button { flex:0 0 40vw !important; width:40vw !important; height:130px !important;

    /* Press thumb label — compact single-line on mobile */
    #press-thumbs > button > div:last-child { padding:8px 10px !important; gap:3px !important; }
    #press-thumbs > button > div:last-child > div:first-child { display:none !important; }

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ——— Amber cursor glow ———
function AmberCursor() {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current; if(!el) return;
    let x=-200,y=-200,tx=-200,ty=-200;
    const onMove = e=>{ tx=e.clientX; ty=e.clientY; };
    window.addEventListener('pointermove',onMove);
    let raf;
    const tick = ()=>{
      x+=(tx-x)*0.18; y+=(ty-y)*0.18;
      el.style.transform=`translate(${x}px,${y}px)`;
      raf=requestAnimationFrame(tick);
    };
    tick();
    return ()=>{ window.removeEventListener('pointermove',onMove); cancelAnimationFrame(raf); };
  },[]);
  return <div ref={ref} aria-hidden style={{
    position:'fixed',top:0,left:0,width:480,height:480,marginLeft:-240,marginTop:-240,
    pointerEvents:'none',zIndex:1,
    background:'radial-gradient(circle,var(--accent-soft) 0%,transparent 60%)',
    opacity:0.55,mixBlendMode:'screen',
  }}/>;
}

// ——— Scroll reveal ———
function Reveal({children,delay=0,y=24,as='div',...rest}) {
  const ref=useRef();
  const [v,setV]=useState(false);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const io=new IntersectionObserver(([e])=>{ if(e.isIntersecting){setV(true);io.disconnect();} },{threshold:0.12});
    io.observe(el);
    return ()=>io.disconnect();
  },[]);
  const Tag=as;
  return <Tag ref={ref} {...rest} style={{
    ...(rest.style||{}),
    opacity:v?1:0,
    transform:v?'translateY(0)':`translateY(${y}px)`,
    transition:`opacity 900ms cubic-bezier(.22,.61,.36,1) ${delay}ms,transform 900ms cubic-bezier(.22,.61,.36,1) ${delay}ms`,
  }}>{children}</Tag>;
}

// ——— Animated counter ———
function Counter({to,suffix='',duration=1800,decimals=0}) {
  const ref=useRef(); const [n,setN]=useState(0);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const io=new IntersectionObserver(([e])=>{
      if(!e.isIntersecting) return; io.disconnect();
      const start=performance.now();
      const step=t=>{
        const p=Math.min(1,(t-start)/duration);
        const eased=1-Math.pow(1-p,3);
        setN(eased*to);
        if(p<1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    },{threshold:0.3});
    io.observe(el);
    return ()=>io.disconnect();
  },[to,duration]);
  return <span ref={ref}>{n.toLocaleString(undefined,{minimumFractionDigits:decimals,maximumFractionDigits:decimals})}{suffix}</span>;
}

// ——— Section label ———
function SectionLabel({num,children}) {
  return <div className="sl" style={{display:'flex',alignItems:'center',gap:14,fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.22em',textTransform:'uppercase',color:'var(--accent)',opacity:0.85}}>
    <span style={{fontVariantNumeric:'tabular-nums'}}>§ {num}</span>
    <span className="sl-line" style={{width:36,height:1,background:'currentColor',opacity:0.5,transformOrigin:'left',animation:'slDraw 800ms cubic-bezier(.22,.61,.36,1) both'}}/>
    <span style={{color:'var(--ink-60)'}}>{children}</span>
  </div>;
}

// ——— Marquee ———
function Marquee({children,reverse=false,speed=60,style={}}) {
  return <div style={{overflow:'hidden',position:'relative',...style}}>
    <div style={{display:'flex',gap:0,width:'max-content',animation:`${reverse?'mq-rev':'mq-fwd'} ${speed}s linear infinite`}}>
      {children}{children}
    </div>
  </div>;
}

// ——— Smart image ———
function SmartImg({src,alt,style,className,label}) {
  const [err,setErr]=useState(false);
  if(err) return <div className={className} style={{...style,alignItems:'center',justifyContent:'center',background:'repeating-linear-gradient(45deg,var(--surface-1),var(--surface-1) 8px,var(--surface-2) 8px,var(--surface-2) 16px)',color:'var(--ink-40)',fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.1em'}}>{label||alt||'IMAGE'}</div>;
  return <img src={src} alt={alt||''} className={className} style={style} onError={()=>setErr(true)} loading="lazy"/>;
}

function Floor() {
  const photos = [
    { src:'images/floor/tbm-aft-28.jpg',  cat:'KEYNOTE',     title:'On stage — bear market strategy' },
    { src:'images/floor/tbm-aft-49.jpg',  cat:'AFTERNOON',   title:'The 15th cohort, in session' },
    { src:'images/floor/tbm-aft-56.jpg',  cat:'AFTERNOON',   title:'Day Three · morning rush' },
    { src:'images/floor/tbm-aft-58.jpg',  cat:'KEYNOTE',     title:'Center stage — live teach' },
    { src:'images/floor/tbm-aft2-240.jpg',cat:'COMMUNITY',   title:'Meet-and-greet, front of house' },
    { src:'images/floor/tbm-aft3-14.jpg', cat:'ACADEMY',     title:'Cohort portrait · group 4' },
    { src:'images/floor/tbm-aft3-34.jpg', cat:'CLOSING',     title:'One class. One record.' },
    { src:'images/floor/tbm-day3-406.jpg',cat:'DAY THREE',   title:'Main hall fills up' },
    { src:'images/floor/tbm-day3-450.jpg',cat:'DAY THREE',   title:'Stage in full swing' },
    { src:'images/floor/tbm-eve-71.jpg',  cat:'EVENING',     title:'Crowd lights — final hour' },
    { src:'images/floor/tbm-eve-74.jpg',  cat:'EVENING',     title:'Curtain call · 一生一起走' },
  ];
  const [current, setCurrent] = useState(0);
  const [paused, setPaused] = useState(false);
  const N = photos.length;

  // Auto-advance left → right every 3.5s
  useEffect(() => {
    if (paused) return;
    const id = setInterval(() => setCurrent(c => (c + 1) % N), 3500);
    return () => clearInterval(id);
  }, [paused, N]);

  // Compute layout for each card based on relative position to current
  const getStyle = (i) => {
    // signed shortest distance in circular range
    let d = i - current;
    if (d > N / 2) d -= N;
    if (d < -N / 2) d += N;
    const abs = Math.abs(d);
    if (abs > 2) return { opacity: 0, transform: 'translate(-50%,-50%) scale(0.6)', pointerEvents: 'none', zIndex: 0, filter: 'blur(8px)' };
    const isCenter = d === 0;
    const offsetX = d * (window.innerWidth <= 900 ? 220 : 380);
    const scale = isCenter ? 1 : (abs === 1 ? 0.78 : 0.58);
    const rotY = d * -18;
    const op = isCenter ? 1 : (abs === 1 ? 0.55 : 0.22);
    const blur = isCenter ? 0 : (abs === 1 ? 2 : 5);
    return {
      transform: `translate(calc(-50% + ${offsetX}px),-50%) rotateY(${rotY}deg) scale(${scale})`,
      opacity: op,
      zIndex: 10 - abs,
      filter: `blur(${blur}px) brightness(${isCenter ? 1 : 0.6})`,
      cursor: isCenter ? 'default' : 'pointer',
    };
  };

  const p = photos[current];

  return (
    <section id="floor" style={{padding:'140px 0 160px',background:'var(--bg)',overflow:'hidden',borderTop:'1px solid var(--line)',position:'relative'}}>
      <div aria-hidden style={{position:'absolute',inset:0,zIndex:0,overflow:'hidden',pointerEvents:'none'}}>
        <iframe src="https://www.youtube.com/embed/TWiU8AIAoDE?autoplay=1&mute=1&loop=1&playlist=TWiU8AIAoDE&controls=0&showinfo=0&rel=0&modestbranding=1&playsinline=1" title="bg" allow="autoplay; encrypted-media" style={{position:'absolute',top:'50%',left:'50%',width:'177.78vh',height:'100vh',minWidth:'100%',minHeight:'56.25vw',transform:'translate(-50%,-50%) scale(1.15)',border:'none',pointerEvents:'none'}}/>
        <div className="floor-scrim" style={{position:'absolute',inset:0}}/>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 60% 50% at 10% 0%,rgba(229,180,106,0.10),transparent 55%)'}}/>
      </div>
      <div style={{position:'relative',zIndex:2}}>
      <CornerMarks/>
      <div style={{maxWidth:1440,margin:'0 auto',padding:'0 40px'}}>
        <Reveal><SectionLabel num="07">On the floor · photo archive</SectionLabel></Reveal>

        <div style={{display:'grid',gridTemplateColumns:'1.3fr 1fr',gap:60,alignItems:'end',marginTop:24,marginBottom:64}} className="grid-2col">
          <Reveal delay={80}>
            <h2 style={{fontFamily:'var(--serif)',fontSize:'clamp(3rem,8vw,8rem)',fontWeight:400,margin:0,lineHeight:0.92,letterSpacing:'-0.03em',color:'var(--ink)'}}>
              On the <span style={{fontStyle:'italic',color:'var(--accent)'}}>floor</span>
              <span style={{color:'var(--accent)',textShadow:'0 0 20px rgba(229,180,106,0.6)'}}>.</span>
            </h2>
          </Reveal>
          <Reveal delay={180}>
            <p style={{color:'var(--ink-80)',fontSize:17,lineHeight:1.6,margin:0,fontFamily:'var(--sans)',maxWidth:520,justifySelf:'end'}}>
              Inside the arena that broke the record — three days, nearly a thousand attendees, one venue. The keynote, the cohort portraits, and the curtain-call crowd that made history.
            </p>
          </Reveal>
        </div>
      </div>

      <Reveal delay={220} y={32}>
        <div
          className="floor-cf"
          onMouseEnter={()=>setPaused(true)}
          onMouseLeave={()=>setPaused(false)}
        >
          {photos.map((ph, i) => {
            const st = getStyle(i);
            // distance again for center caption gating
            let d = i - current; if (d > N/2) d -= N; if (d < -N/2) d += N;
            const isCenter = d === 0;
            return (
              <div
                key={i}
                className="floor-cf-card"
                style={st}
                onClick={() => !isCenter && setCurrent(i)}
              >
                <img src={ph.src + '?v=2'} alt={ph.title} loading={Math.abs(d) <= 2 ? 'eager' : 'lazy'}/>
                {isCenter && (
                  <div className="floor-cf-caption">
                    <div className="cat">{ph.cat}</div>
                    <div className="ttl">{ph.title}</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Reveal>

      {/* Counter + progress */}
      <div style={{maxWidth:1440,margin:'40px auto 0',padding:'0 40px',display:'flex',alignItems:'center',justifyContent:'center',gap:20,flexWrap:'wrap'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.24em',color:'var(--accent)',fontVariantNumeric:'tabular-nums'}}>{String(current+1).padStart(2,'0')}</span>
        <div style={{flex:'0 1 320px',height:1,background:'var(--line-strong)',position:'relative',overflow:'hidden'}}>
          <div key={current+'-'+paused} style={{position:'absolute',inset:0,background:'var(--accent)',transformOrigin:'left',transform:'scaleX(0)',animation:paused?'none':'floor-bar 3500ms linear forwards'}}/>
        </div>
        <span style={{fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.24em',color:'var(--ink-60)',fontVariantNumeric:'tabular-nums'}}>{String(N).padStart(2,'0')}</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'0.2em',color:'var(--ink-40)',textTransform:'uppercase',marginLeft:12}}>{paused ? '⏸ PAUSED · HOVER OFF TO PLAY' : '▶ AUTO · HOVER TO PAUSE'}</span>
      </div>

      <style>{`
        @keyframes floor-bar { from { transform:scaleX(0); } to { transform:scaleX(1); } }
      `}</style>
      </div>
    </section>
  );
}

<script>
(function(){
  function fixPressScroll(){
    var thumbs = document.getElementById('press-thumbs');
    if(!thumbs) return;
    var el = thumbs;
    while(el && el !== document.body){
      el.style.setProperty('overflow-x', el === thumbs ? 'scroll' : 'visible', 'important');
      el.style.setProperty('overflow-y', 'visible', 'important');
      el = el.parentElement;
    }
    thumbs.style.setProperty('-webkit-overflow-scrolling','touch','important');
  }
  if(window.innerWidth <= 768){
    fixPressScroll();
    setTimeout(fixPressScroll, 500);
    setTimeout(fixPressScroll, 1500);
  }
})();
</script>
<script>
// Fix circles after React renders
function fixCircles(){
  document.querySelectorAll('*').forEach(function(el){
    var s = getComputedStyle(el);
    if(s.borderRadius==='50%' && el.offsetWidth>30 && el.offsetWidth<60){
      el.style.setProperty('display','flex','important');
      el.style.setProperty('align-items','center','important');
      el.style.setProperty('justify-content','center','important');
    }
  });
}
setTimeout(fixCircles,1500);
setTimeout(fixCircles,3000);
</script>
